# oneshot — agentic CI for sv2pi
#
# Each job injects a single prompt into Pi and validates that the agent
# accomplishes the goal in one shot — no confusion loops, no spiraling,
# no probing cascades. The skill instructions alone must guide the agent
# to successful completion.
#
# Benchmark model: deepseek/deepseek-chat (mid-tier, via OpenRouter).
# Secret required: OPENROUTER_API_KEY (set in repo Settings → Secrets → Actions).

name: oneshot

on:
  workflow_dispatch:

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  PI_ARGS: "--provider openrouter --model deepseek/deepseek-chat"

jobs:
  # todo